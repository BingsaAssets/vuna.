<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vuna.</title>
    <!-- Vanta Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --sidebar-width: 72px;
            --sidebar-margin: 2.5vw;
            --content-safe-right: calc(var(--sidebar-width) + (var(--sidebar-margin) * 2));
            --vuna-bg: #000000;
            --accent-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--vuna-bg);
            color: white;
        }

        #vanta-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loaders */
        #loader, .circular-loader {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: black;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Page Sections */
        .page-section {
            position: absolute;
            inset: 0;
            z-index: 10;
            padding: 8vh var(--content-safe-right) 8vh 5vw;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .page-section.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 800;
            letter-spacing: -0.06em;
            line-height: 0.9;
            text-transform: lowercase;
            margin-bottom: 0.2em;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
        }

        /* Music Specific UI */
        .music-header-box {
            width: 100%;
            max-width: 700px;
            background: var(--accent-glass);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 40px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .search-module {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #music-search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 18px 24px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #music-search-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Floating Search Icon */
        #floating-search-trigger {
            position: fixed;
            top: calc(50% - 240px);
            right: var(--sidebar-margin);
            width: var(--sidebar-width);
            height: var(--sidebar-width);
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: black;
            border-radius: 24px;
            cursor: pointer;
            z-index: 600;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        #floating-search-trigger.visible {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1100px;
            padding-bottom: 180px;
        }

        .track-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .track-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.15);
        }

        .track-art {
            aspect-ratio: 1;
            width: 100%;
            border-radius: 16px;
            margin-bottom: 14px;
            object-fit: cover;
            background: #111;
        }

        /* Player Bar Redesign */
        #player-bar {
            position: fixed;
            bottom: 25px;
            left: 5vw;
            right: var(--content-safe-right);
            height: 90px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 25px;
            transform: translateY(150%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #player-bar.active { transform: translateY(0); }

        .player-info { display: flex; align-items: center; gap: 15px; width: 30%; min-width: 200px; }
        #current-art { width: 56px; height: 56px; border-radius: 12px; background-size: cover; background-color: #1a1a1a; }
        .track-meta { overflow: hidden; }
        .track-title { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; }

        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 20px; }
        .player-btns { display: flex; align-items: center; gap: 25px; }
        
        .main-play-btn { color: white; cursor: pointer; transition: transform 0.2s; }
        .main-play-btn:hover { transform: scale(1.15); }
        
        .progress-wrapper { width: 100%; display: flex; align-items: center; gap: 12px; font-size: 0.75rem; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; }
        .progress-container { flex: 1; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; cursor: pointer; position: relative; }
        #progress-bar { height: 100%; background: white; border-radius: 10px; width: 0%; position: relative; }
        #progress-bar::after { content: ''; position: absolute; right: -4px; top: -3px; width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
        .progress-container:hover #progress-bar::after { opacity: 1; }

        .player-actions { width: 30%; display: flex; justify-content: flex-end; gap: 20px; color: rgba(255,255,255,0.5); }
        .action-icon { cursor: pointer; transition: color 0.2s; }
        .action-icon:hover, .action-icon.active { color: white; }

        /* Lyrics Overlay */
        #lyrics-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(50px);
            z-index: 90;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 5vw;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }
        #lyrics-overlay.visible { opacity: 1; visibility: visible; }
        #lyrics-content {
            width: 100%;
            max-width: 800px;
            height: 100%;
            overflow-y: auto;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
            line-height: 1.6;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        .lyric-line { padding: 10px 0; transition: all 0.3s; cursor: pointer; }
        .lyric-line.active { color: white; transform: scale(1.1); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            right: var(--sidebar-margin);
            top: 50%;
            transform: translateY(-50%);
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 500;
            opacity: 0;
            transition: all 0.8s ease;
        }
        .sidebar.visible { opacity: 1; }
        .nav-item {
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.4s ease;
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 16px;
        }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255, 255, 255, 0.08); }

        @media (max-width: 768px) {
            :root { --content-safe-right: 0px; }
            .sidebar { top: auto; bottom: 3vh; left: 50%; right: auto; transform: translateX(-50%); flex-direction: row; width: auto; height: 72px; padding: 0 24px; }
            #player-bar { left: 10px; right: 10px; padding: 0 15px; }
            .player-info { width: auto; flex: 1; }
            .player-actions, .progress-wrapper span { display: none; }
            #floating-search-trigger { display: none; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="margin-top: 15px; opacity: 0.5;">vuna. is waking up</div>
    </div>

    <div id="vanta-canvas"></div>

    <div class="app-container">
        
        <div id="floating-search-trigger" onclick="scrollToSearch()"><i data-lucide="search"></i></div>

        <!-- Lyrics Overlay -->
        <div id="lyrics-overlay">
            <div id="lyrics-content">
                <!-- Lines populated by JS -->
            </div>
        </div>

        <!-- Home Section -->
        <main class="page-section visible" id="main-content" style="justify-content:center; text-align:center;">
            <h1>vuna.</h1>
            <div id="random-subtitle" class="subtitle"></div>
        </main>

        <!-- Music Section -->
        <section id="music-content" class="page-section">
            <div class="music-header-box" id="music-header">
                <h2 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Music</h2>
                <p style="color: rgba(255,255,255,0.4); margin-bottom: 30px;">Stream your favorite tracks instantly</p>
                <div class="search-module">
                    <input type="text" id="music-search-input" placeholder="Search songs, artists, albums...">
                    <div id="search-loader" style="display:none;"><div class="spinner" style="width:24px; height:24px; border-width:2px;"></div></div>
                </div>
            </div>
            
            <div class="music-grid" id="music-results">
                <!-- Tracks here -->
            </div>
        </section>

        <!-- Credits Section -->
        <section id="credits-content" class="page-section">
            <h2 style="font-size: 3rem; font-weight: 800; margin-bottom: 40px;">Credits</h2>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1000px;">
                <div class="track-card" style="cursor:default; padding: 30px;">
                    <h3 style="margin-bottom:10px;">d4rkkn1ght</h3>
                    <p style="opacity:0.5;">Developer & Designer</p>
                </div>
                <div class="track-card" style="cursor:default; padding: 30px;">
                    <h3 style="margin-bottom:10px;">Tidal</h3>
                    <p style="opacity:0.5;">Audio Engine Provider</p>
                </div>
            </div>
        </section>

        <!-- Settings Section -->
        <section id="settings-content" class="page-section">
             <div class="subtitle">Settings coming soon</div>
        </section>

        <!-- Games Section -->
        <section id="games-content" class="page-section">
            <div class="subtitle">Games coming soon</div>
        </section>
    </div>

    <!-- Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" data-tab="home"><i data-lucide="home"></i></div>
        <div class="nav-item" data-tab="music"><i data-lucide="music"></i></div>
        <div class="nav-item" data-tab="games"><i data-lucide="gamepad-2"></i></div>
        <div class="nav-item" data-tab="credits"><i data-lucide="user"></i></div>
        <div class="nav-item" data-tab="settings"><i data-lucide="settings"></i></div>
    </nav>

    <!-- Player Bar -->
    <div id="player-bar">
        <div class="player-info">
            <div id="current-art"></div>
            <div class="track-meta">
                <div id="current-title" class="track-title">Not Playing</div>
                <div id="current-artist" class="track-artist">Select a track</div>
            </div>
        </div>

        <div class="player-center">
            <div class="player-btns">
                <div class="main-play-btn" id="play-pause-btn"><i data-lucide="play" size="32"></i></div>
            </div>
            <div class="progress-wrapper">
                <span id="current-time">0:00</span>
                <div class="progress-container" id="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <span id="duration-time">0:00</span>
            </div>
        </div>

        <div class="player-actions">
            <div class="action-icon" id="lyrics-toggle" title="Lyrics"><i data-lucide="list-music"></i></div>
        </div>
        
        <audio id="audio-player" style="display:none;"></audio>
    </div>

    <script>
        lucide.createIcons();

        const subtitles = ["vuna got the best games❤️‍🩹", "explore the collection", "just vibes and high scores", "play different."];
        let vantaEffect = null;
        let currentLyrics = [];

        // --- NAVIGATION & UI HELPERS ---
        function scrollToSearch() {
            const musicSection = document.getElementById('music-content');
            musicSection.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleFloatingSearch(show) {
            const trigger = document.getElementById('floating-search-trigger');
            if (show) trigger.classList.add('visible');
            else trigger.classList.remove('visible');
        }

        document.getElementById('music-content').addEventListener('scroll', (e) => {
            const header = document.getElementById('music-header');
            const rect = header.getBoundingClientRect();
            // If the search bar is scrolled out of view
            if (rect.bottom < 0) {
                toggleFloatingSearch(true);
            } else {
                toggleFloatingSearch(false);
            }
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const target = item.getAttribute('data-tab');
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                // Clean up floating search if leaving music
                if (target !== 'music') toggleFloatingSearch(false);

                document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('visible'));
                const targetId = target + '-content';
                const section = document.getElementById(targetId) || document.getElementById('main-content');
                
                setTimeout(() => section.classList.add('visible'), 50);
            });
        });

        // --- MUSIC LOGIC ---
        const searchInput = document.getElementById('music-search-input');
        const resultsGrid = document.getElementById('music-results');
        const audioPlayer = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const lyricsOverlay = document.getElementById('lyrics-overlay');
        const lyricsContent = document.getElementById('lyrics-content');

        async function fetchSongs(query) {
            document.getElementById('search-loader').style.display = 'block';
            try {
                const response = await fetch(`https://ess-education.org/worker/music/tidal/search/tracks?q=${encodeURIComponent(query)}&max=20&page=1`);
                const data = await response.json();
                return data.items || [];
            } catch (err) { return []; }
            finally { document.getElementById('search-loader').style.display = 'none'; }
        }

        async function fetchAudio(trackId) {
            try {
                const response = await fetch(`https://ess-education.org/worker/music/tidal/download/lossless/${trackId}`);
                const data = await response.json();
                return data.streamUrl;
            } catch (err) { return null; }
        }

        async function fetchLyrics(trackName, artistName) {
            try {
                const query = `${artistName} ${trackName}`;
                const response = await fetch(`https://ess-education.org/api/lyric/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                return data[0]?.syncedLyrics || data[0]?.plainLyrics || "";
            } catch (err) { return "Lyrics not found."; }
        }

        function renderTracks(tracks) {
            resultsGrid.innerHTML = tracks.map(track => {
                const cover = `https://resources.tidal.com/images/${track.album.cover.replace(/-/g, '/')}/640x640.jpg`;
                return `
                    <div class="track-card" onclick="playTrack('${track.id}', '${track.title.replace(/'/g, "\\'")}', '${track.artist.name.replace(/'/g, "\\'")}', '${cover}')">
                        <img src="${cover}" class="track-art" loading="lazy">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist.name}</div>
                    </div>
                `;
            }).join('');
        }

        async function playTrack(id, title, artist, cover) {
            document.getElementById('player-bar').classList.add('active');
            document.getElementById('current-title').innerText = title;
            document.getElementById('current-artist').innerText = artist;
            document.getElementById('current-art').style.backgroundImage = `url(${cover})`;

            const [audioUrl, lyricsRaw] = await Promise.all([
                fetchAudio(id),
                fetchLyrics(title, artist)
            ]);

            if (audioUrl) {
                audioPlayer.src = audioUrl;
                audioPlayer.play();
                updatePlayIcon(true);
                parseLyrics(lyricsRaw);
            }
        }

        function parseLyrics(raw) {
            lyricsContent.innerHTML = '';
            currentLyrics = [];
            if (!raw) {
                lyricsContent.innerHTML = '<div class="lyric-line">No lyrics found</div>';
                return;
            }
            const lines = raw.split('\n');
            const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lines.forEach(line => {
                const match = line.match(timeRegex);
                const text = line.replace(timeRegex, '').trim();
                if (text) {
                    const time = match ? (parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 100) : null;
                    const div = document.createElement('div');
                    div.className = 'lyric-line';
                    div.innerText = text;
                    div.onclick = () => { if(time !== null) audioPlayer.currentTime = time; };
                    lyricsContent.appendChild(div);
                    currentLyrics.push({ time, element: div });
                }
            });
        }

        function updatePlayIcon(isPlaying) {
            playPauseBtn.innerHTML = isPlaying ? `<i data-lucide="pause" size="32"></i>` : `<i data-lucide="play" size="32"></i>`;
            lucide.createIcons();
        }

        playPauseBtn.onclick = () => {
            if (audioPlayer.paused) { audioPlayer.play(); updatePlayIcon(true); }
            else { audioPlayer.pause(); updatePlayIcon(false); }
        };

        document.getElementById('lyrics-toggle').onclick = function() {
            this.classList.toggle('active');
            lyricsOverlay.classList.toggle('visible');
        };

        audioPlayer.ontimeupdate = () => {
            const time = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            const percent = (time / duration) * 100;
            progressBar.style.width = `${percent}%`;
            
            document.getElementById('current-time').innerText = formatTime(time);
            document.getElementById('duration-time').innerText = isNaN(duration) ? "0:00" : formatTime(duration);

            // Sync Lyrics
            let activeIdx = -1;
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentLyrics[i].time !== null && time >= currentLyrics[i].time) {
                    activeIdx = i;
                } else break;
            }
            if (activeIdx !== -1) {
                const lines = lyricsContent.querySelectorAll('.lyric-line');
                lines.forEach(el => el.classList.remove('active'));
                const activeEl = currentLyrics[activeIdx].element;
                activeEl.classList.add('active');
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = pos * audioPlayer.duration;
        };

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && searchInput.value.trim() !== '') {
                const results = await fetchSongs(searchInput.value);
                renderTracks(results);
            }
        });

        // --- INIT ---
        window.onload = () => {
            document.getElementById('random-subtitle').textContent = subtitles[Math.floor(Math.random() * subtitles.length)];
            
            if (typeof VANTA !== 'undefined') {
                vantaEffect = VANTA.FOG({
                    el: "#vanta-canvas",
                    mouseControls: true, touchControls: true,
                    highlightColor: 0x222222, midtoneColor: 0x111111,
                    lowlightColor: 0x0, baseColor: 0x0,
                    blurFactor: 0.8, speed: 1.5, zoom: 1.0
                });
            }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                document.getElementById('vanta-canvas').style.opacity = '1';
                document.getElementById('sidebar').classList.add('visible');
            }, 600);
        };

        function closeModal() {
            // Not used in this iteration but kept for reference
        }
    </script>
</body>
</html>
