<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    
    <title>Jetpack Joyride</title>

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/genizy/jride@475e65ec2f642cf50bb80f09f4f4188cf8c26faa/css/styles.css">
    
    <style>
        html, body { 
            background: #000; /* Set a default color to avoid white flashes */
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        /* Ensure the font loader is hidden but still forces a load */
        .fontLoader {
            position: absolute;
            visibility: hidden;
            font-family: 'jetpackia';
        }
    </style>

    <script defer src="https://cdn.jsdelivr.net/gh/genizy/jride@475e65ec2f642cf50bb80f09f4f4188cf8c26faa/h5Sdk.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/genizy/jride@475e65ec2f642cf50bb80f09f4f4188cf8c26faa/engine/phaser-3.24.1.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/genizy/jride@475e65ec2f642cf50bb80f09f4f4188cf8c26faa/game3.js"></script>
</head>
<body>

    <div class="fontLoader">.</div>
    
    <img id="rotate_image" 
         src="https://cdn.jsdelivr.net/gh/genizy/jride@475e65ec2f642cf50bb80f09f4f4188cf8c26faa/img/HB_ic_rotateScreen.png" 
         alt="Please rotate your screen" 
         class="center">

    <div id="content">
        <div id="phaser-canvas"></div>
    </div>        

</body> 
</html>
